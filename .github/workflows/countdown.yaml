name: Update Countdown

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run countdown script
        run: python .github/scripts/countdown.py

      - name: Update README safely
        run: |
          if grep -q "⏱ Time Remaining" README.md; then
            CONTENT=$(cat countdown.txt)
            sed -i "s|⏱ Time Remaining.*|$CONTENT|g" README.md
          else
            echo "Countdown line not found, skipping..."
          fi

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -m "update countdown" || exit 0
          git push
