name: Update Countdown

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run countdown script
        run: python .github/scripts/countdown.py

      - name: Update README safely (FIXED)
        run: |
          python - << 'EOF'
          import re

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          with open("countdown.txt", "r", encoding="utf-8") as f:
              countdown = f.read()

          new_readme = re.sub(
              r"⏱ Time Remaining:.*",
              countdown.replace("\\", "\\\\"),
              readme,
              flags=re.S
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update countdown" || exit 0
          git push
